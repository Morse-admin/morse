<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morse — Skýr skilaboð</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,600;8..60,700&family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  /* Icelandic flag: blue #02529C, red #DC1E35, white */
  --ice:#FFFFFF;          /* white page background */
  --panel:#FFFFFF;        /* flag-white boxes */
  --basalt:#0A2A52;       /* dark blue text */
  --steam:#5B7290;        /* muted blue-grey text */
  --line:#E2E8F0;         /* soft neutral border */
  --line-soft:#EEF2F7;    /* even softer, for chart grids */
  --chip-bg:#EEF2F7;      /* unselected chip background */
  --hydro:#02529C;        /* flag blue */
  --hydro-soft:#EAF1FA;   /* softened blue tint for callouts */
  --magma:#DC1E35;        /* flag red */
  --magma-soft:#FCE9EC;   /* softened red tint for callouts */
  --moss:#02529C;         /* status accents fold into flag blue */
  --moss-soft:#EAF1FA;
  --shadow:0 4px 6px -1px rgba(10,42,82,.06),0 2px 4px -2px rgba(10,42,82,.04);
  --radius:14px;
  --mono:'IBM Plex Mono',monospace;
  --brand:'Source Serif 4',Georgia,serif;   /* logo wordmark only */
  --sans:'Inter',system-ui,-apple-system,sans-serif;
  --disp:'Inter',system-ui,-apple-system,sans-serif;  /* big glanceable numbers */
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--ice);color:var(--basalt);font-family:var(--sans);font-size:16px;line-height:1.5}
.wrap{max-width:1060px;margin:0 auto;padding:0 20px 80px}

/* ---------- header ---------- */
header{padding:34px 0 22px;border-bottom:2px solid var(--basalt);position:relative}
.topbar{position:absolute;top:28px;right:0;display:flex;align-items:center;gap:14px;flex-wrap:wrap;justify-content:flex-end;max-width:78%}
.langsw{display:flex;gap:6px}
.langsw button{font-size:20px;line-height:1;padding:4px 7px;border:1.5px solid transparent;background:#fff;cursor:pointer;border-radius:3px;filter:grayscale(.65);opacity:.7}
.langsw button.on{border-color:var(--hydro);filter:none;opacity:1}
.langsw button:hover{filter:none;opacity:1}
.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--steam)}
h1{display:flex;align-items:center;flex-wrap:wrap;column-gap:18px;row-gap:2px;margin-top:6px}
.logo-main{font-family:var(--disp);font-weight:800;font-size:clamp(40px,13vw,80px);line-height:.92;letter-spacing:-.02em;color:var(--basalt);white-space:nowrap}
.logo-sub{font-family:var(--disp);font-weight:600;font-size:clamp(12px,4.2vw,22px);letter-spacing:.32em;color:var(--basalt);text-transform:uppercase;white-space:nowrap}
.src{margin-top:8px;font-size:13px;color:var(--steam)}
.src a{color:var(--hydro)}

/* ---------- access controls (in header) ---------- */
.access{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.access .mode{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;padding:3px 9px}
.access .mode.free{background:var(--magma-soft);color:var(--magma);border:1px solid var(--magma)}
.access .mode.livem{background:var(--moss-soft);color:var(--moss);border:1px solid var(--moss)}
.access .msg{font-size:12.5px;color:var(--steam)}
.access input{font-family:var(--mono);font-size:12px;padding:6px 10px;border:1px solid var(--line);border-radius:8px;width:130px}
.access button{font-family:var(--mono);font-size:12px;font-weight:600;padding:6px 14px;border:1px solid var(--basalt);border-radius:8px;background:var(--basalt);color:#fff;cursor:pointer}
.access button:hover{background:var(--hydro);border-color:var(--hydro)}
.access .err{color:var(--magma);font-family:var(--mono);font-size:12px}

/* ---------- chart range selector ---------- */
.range-chips{display:flex;gap:6px;margin-top:14px}
.rbtn{font-family:var(--mono);font-size:11px;font-weight:600;padding:4px 11px;border:none;border-radius:9999px;background:var(--chip-bg);color:var(--steam);cursor:pointer;transition:background .15s,color .15s}
.rbtn:hover{background:var(--hydro-soft);color:var(--basalt)}
.rbtn.on{background:var(--basalt);color:#fff}

/* ---------- events show-more ---------- */
#evCards.collapsed .evcard:nth-child(n+2){display:none}
.evtoggle{font-family:var(--mono);font-size:12px;font-weight:600;padding:7px 16px;border:none;border-radius:9999px;background:var(--chip-bg);color:var(--basalt);cursor:pointer;margin-top:2px}
.evtoggle:hover{background:var(--hydro-soft)}

/* ---------- balancing price panel ---------- */
.prices{margin-top:26px;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px 22px 18px}
.prices .hero .val{color:var(--basalt)}
.pbar{stroke:none}
.pbar.up{fill:var(--magma)}
.pbar.down{fill:var(--hydro)}
.pbar.mix{fill:#B9C6D6}
.plegend{display:inline-flex;align-items:center;gap:6px;margin-right:14px}
.plegend .sw{width:10px;height:10px;border-radius:2px;display:inline-block}

/* ---------- grid events (auto-narrated) ---------- */
.events{margin-top:26px;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px}
.events h2{font-family:var(--disp);font-size:20px;font-weight:700;margin-bottom:4px}
.events .sub{font-size:13px;color:var(--steam);margin-bottom:14px}
.evcard{border:1px solid var(--line);border-left:4px solid var(--magma);border-radius:8px;padding:14px 16px;margin-bottom:12px;background:#fff}
.evcard.rise{border-left-color:var(--hydro)}
.evcard .evhead{display:flex;flex-wrap:wrap;gap:10px;align-items:baseline;justify-content:space-between}
.evcard .evtitle{font-family:var(--disp);font-weight:700;font-size:21px}
.evcard.rise .evtitle b{color:var(--hydro)}
.evcard .evtitle b{color:var(--magma)}
.evcard .evtime{font-family:var(--mono);font-size:12px;color:var(--steam)}
.evcard .evbody{font-size:14px;margin-top:6px;line-height:1.55}
.evcard .evsnid{font-family:var(--mono);font-size:12.5px;margin-top:6px;color:var(--basalt)}
.evcard .evnote{margin-top:10px;font-size:13px;padding:12px 16px;border-radius:8px;background:var(--magma-soft);border-left:3px solid var(--magma)}
.evcard .evnote.pending{background:#F4F7FA;border-left-color:var(--line);color:var(--steam)}

/* ---------- notifications table ---------- */
.ntbl{margin-top:26px;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px}
.ntbl h2{font-family:var(--disp);font-size:20px;font-weight:700;margin-bottom:4px}
.ntbl .sub{font-size:13px;color:var(--steam);margin-bottom:12px}
.ntbl .scroll{max-height:340px;overflow-y:auto;border-top:1.5px solid var(--basalt)}
table.notifs{width:100%;border-collapse:collapse;font-size:13.5px}
table.notifs th{font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--steam);text-align:left;padding:8px 10px 6px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--panel)}
table.notifs td{padding:7px 10px;border-bottom:1px solid var(--line);vertical-align:top}
table.notifs td.mono{font-family:var(--mono);font-size:12px;white-space:nowrap}
table.notifs td.lag{font-family:var(--mono);font-size:12px;white-space:nowrap;color:var(--magma);font-weight:600}
table.notifs td.lag.fast{color:var(--moss)}
table.notifs tr:hover td{background:var(--hydro-soft)}
.ntbl .foot2{font-size:11.5px;color:var(--steam);margin-top:8px}

/* ---------- live consumption panel ---------- */
.live{margin-top:26px;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px 22px 18px}
.live .big{font-family:var(--disp);font-weight:700;font-size:clamp(30px,5vw,44px);line-height:1;color:var(--hydro);font-variant-numeric:tabular-nums}
.live .big small{font-size:.42em;font-weight:600;color:var(--basalt)}
.lcons{fill:none;stroke:var(--hydro);stroke-width:3;stroke-linejoin:round;stroke-linecap:round}
.lconsarea{fill:var(--hydro);opacity:.08}
.notifline{stroke:var(--magma);stroke-width:1.5;stroke-dasharray:3 3}
.notifhit{fill:transparent;cursor:pointer}
.notifdot{fill:var(--magma);stroke:#fff;stroke-width:1.5;cursor:pointer}
.livedot{fill:var(--hydro);stroke:#fff;stroke-width:2;pointer-events:none}
.live .peak{font-family:var(--mono);font-size:12px;color:var(--steam);text-align:right}
.live .peak b{color:var(--hydro)}

/* ---------- hourly day profile ---------- */
.h48{margin-top:26px;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px 22px 18px}
.h48-head{display:flex;flex-wrap:wrap;gap:14px;align-items:flex-start;justify-content:space-between}
.belowchart{margin-top:12px}
.h48 .big{font-family:var(--disp);font-weight:700;font-size:clamp(30px,5vw,44px);line-height:1;color:var(--magma);font-variant-numeric:tabular-nums}
.h48 .big small{font-size:.42em;font-weight:600;color:var(--basalt)}
.h48 .peak{font-family:var(--mono);font-size:12px;color:var(--steam);text-align:right}
.h48 .peak b{color:var(--magma)}
.metric-row{display:flex;flex-wrap:wrap;justify-content:space-between;align-items:flex-start;gap:24px 32px}
.hero{min-width:230px}
.hero .val{font-family:var(--disp);font-weight:800;font-size:clamp(30px,4.8vw,46px);line-height:1;color:var(--basalt);font-variant-numeric:tabular-nums;white-space:nowrap}
.live .hero .val{color:var(--hydro)}
.h48 .hero .val{color:var(--magma)}
.hero .sub{font-family:var(--sans);font-size:13.5px;color:var(--steam);margin-top:8px}
.ctx{display:flex;flex-direction:column;gap:6px;text-align:right;font-family:var(--mono);font-size:12.5px;color:var(--steam);white-space:nowrap;padding-top:6px}
.ctx b{color:var(--basalt);font-weight:600;font-variant-numeric:tabular-nums}
.ctx .ctx-note{color:var(--steam);opacity:.8}
.chart-wrap{margin-top:14px;position:relative}
.chart-wrap svg{display:block;width:100%;height:auto}
.hgrid{stroke:var(--line-soft);stroke-width:1}
.larea{fill:var(--magma);opacity:.10}
.lpath{fill:none;stroke:var(--magma);stroke-width:3;stroke-linejoin:round;stroke-linecap:round}
.hhit{fill:transparent;cursor:crosshair}
.hdot{fill:var(--magma);stroke:#fff;stroke-width:2;pointer-events:none}
.axlbl{font-family:var(--mono);font-size:10px;fill:var(--steam)}
.aylbl{font-family:var(--mono);font-size:10px;fill:var(--steam)}
.daylbl{font-family:var(--mono);font-size:11px;font-weight:600;fill:var(--basalt);letter-spacing:.08em}
.htip{font-family:var(--mono);font-size:12.5px;margin-top:10px;min-height:20px;color:var(--basalt)}
.htip b{color:var(--magma)}
.stns{color:var(--steam);font-family:var(--mono);font-size:12px}

/* ---------- scrubber panel ---------- */
.now{margin-top:26px;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px 22px 26px}
.now-head{display:flex;flex-wrap:wrap;gap:18px;align-items:flex-end;justify-content:space-between}
.readout .lbl{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--steam)}
.readout .big{font-family:var(--disp);font-weight:700;font-size:clamp(40px,7vw,64px);line-height:1;color:var(--magma);font-variant-numeric:tabular-nums}
.readout .big small{font-size:.45em;font-weight:600;color:var(--basalt)}
.readout .sub{font-size:13px;color:var(--steam);margin-top:2px}
.scrub{flex:1;min-width:260px;max-width:460px}
.scrub .date{font-family:var(--mono);font-weight:600;font-size:15px}
.scrub input[type=range]{width:100%;margin-top:8px;accent-color:var(--magma);cursor:pointer}
.scrub .ends{display:flex;justify-content:space-between;font-family:var(--mono);font-size:11px;color:var(--steam);margin-top:2px;padding:0 42px}
.sliderline{display:flex;align-items:center;gap:8px;margin-top:8px}
.sliderline input[type=range]{flex:1;margin:0;accent-color:var(--magma);cursor:pointer}
.stepbtn{font-family:var(--mono);font-weight:600;font-size:12px;line-height:1;padding:0 10px;height:32px;white-space:nowrap;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--basalt);cursor:pointer;flex:none}
.stepbtn:hover{border-color:var(--magma);color:var(--magma)}
.stepbtn:active{background:var(--magma-soft)}
.stepbtn:disabled{opacity:.35;cursor:default;border-color:var(--line);color:var(--steam)}

/* capacity band — the signature */
.band-lbl{display:flex;justify-content:space-between;font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--steam);margin:24px 0 6px}
.band{position:relative;height:46px;background:var(--hydro);border-radius:8px;overflow:hidden}
.band .seg{position:absolute;top:0;height:100%;background:var(--magma);transition:left .25s,width .25s}
.band .seg:hover{filter:brightness(1.1)}
.band-legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.band-legend .chip{font-family:var(--mono);font-size:12px;padding:4px 10px;border-radius:9999px;background:var(--chip-bg);transition:opacity .25s}
.band-legend .chip b{color:var(--magma)}
.band-legend .none{color:var(--steam);border-style:dashed}

/* ---------- filters ---------- */
.filters{display:flex;flex-wrap:wrap;gap:8px;margin:34px 0 14px;align-items:center}
.filters .flbl{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--steam);margin-right:4px}
.fbtn{font-family:var(--sans);font-weight:600;font-size:12.5px;padding:7px 15px;border:none;border-radius:9999px;background:var(--chip-bg);color:var(--basalt);cursor:pointer;transition:background .15s,color .15s}
.fbtn:hover{background:var(--hydro-soft)}
.fbtn.on{background:var(--basalt);color:#fff}
.fbtn.on:hover{background:var(--basalt)}
.count{margin-left:auto;font-family:var(--mono);font-size:12px;color:var(--steam)}

/* ---------- outage list ---------- */
.list{border-top:2px solid var(--basalt)}
.row{display:grid;grid-template-columns:86px 1fr 200px;gap:16px;padding:14px 0;border-bottom:1px solid var(--line);background:transparent;transition:background .15s}
.row:hover{background:var(--hydro-soft)}
.row.dim{opacity:.45}
.kks{font-family:var(--mono)}
.kks .code{display:inline-block;font-weight:600;font-size:14px;padding:2px 7px;background:var(--basalt);color:#fff}
.kks .nm{display:block;font-size:11px;color:var(--steam);margin-top:5px;line-height:1.3}
.mid .t{font-weight:600;font-size:15px}
.mid .when{font-family:var(--mono);font-size:12.5px;color:var(--steam);margin-top:3px}
.mid .when b{color:var(--basalt);font-weight:500}
.tags{margin-top:7px;display:flex;flex-wrap:wrap;gap:6px}
.tag{font-family:var(--mono);font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;padding:3px 8px;border-radius:6px;color:var(--steam);background:var(--chip-bg)}
.tag.live{border-color:var(--moss);color:var(--moss);background:var(--moss-soft)}
.tag.done{border-color:var(--line);color:var(--steam);text-decoration:line-through}
.mw{text-align:right}
.mw .val{font-family:var(--disp);font-weight:800;font-size:24px;line-height:1;font-variant-numeric:tabular-nums}
.mw .val.out{color:var(--magma)}
.mw .val.zero{color:var(--steam);font-size:15px;font-weight:600}
.mw .why{display:block;font-size:11.5px;color:var(--steam);margin-top:4px;line-height:1.35}
.mw .est{font-family:var(--mono);font-size:10px;color:var(--magma);letter-spacing:.06em}
.mw .cap{font-family:var(--mono);font-size:10.5px;color:var(--steam);margin-top:2px}

.foot{margin-top:36px;padding-top:14px;border-top:2px solid var(--basalt);font-size:12.5px;color:var(--steam);max-width:760px}
.foot b{color:var(--basalt)}

@media(max-width:840px){
  header{display:flex;flex-direction:column}
  header .eyebrow{order:1}
  header h1{order:2}
  header .topbar{order:3;position:static;margin:16px 0 0;justify-content:flex-start;max-width:100%;gap:10px}
  header .src{order:4;margin-top:12px}
}
@media(max-width:680px){
  .wrap{padding:0 14px 60px}
  header{padding-top:22px}
  h1{row-gap:6px}
  /* cards breathe less on small screens */
  .now,.h48,.live,.ntbl,.events,.prices{padding:16px 14px;margin-top:18px}
  /* hero + context stack vertically */
  .metric-row{flex-direction:column;gap:12px}
  .ctx{text-align:left;white-space:normal;padding-top:0}
  .hero .val{font-size:clamp(30px,9vw,40px)}
  /* charts: keep a readable scale and swipe sideways instead of shrinking */
  .chart-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .chart-wrap svg{min-width:760px;display:block}
  .axlbl,.aylbl{font-size:13px}
  /* notifications table: swipe sideways instead of crushing columns */
  .ntbl .scroll{overflow-x:auto}
  table.notifs{min-width:640px}
  /* outage list rows */
  .row{grid-template-columns:70px 1fr;grid-template-rows:auto auto}
  .mw{grid-column:2;text-align:left;margin-top:4px}
  .now-head{flex-direction:column;align-items:stretch}
  .scrub{max-width:none}
  .scrub .ends{padding:0 8px}
  .band-lbl{flex-wrap:wrap;gap:4px 12px}
  .evcard .evtitle{font-size:18px}
  .filters{margin:24px 0 12px}
}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap">

<header>
  <div class="topbar">
    <div class="access" id="accessBar" style="display:none">
      <span class="mode" id="accessMode">…</span>
      <span class="msg" id="accessMsg"></span>
      <span id="loginBox" style="display:none">
        <input type="password" id="pw" placeholder="aðgangsorð">
        <button id="loginBtn">Opna rauntíma</button>
        <span class="err" id="loginErr"></span>
      </span>
      <button id="logoutBtn" class="lgout" style="display:none">Útskrá</button>
    </div>
    <div class="langsw"><button id="langIS" title="Íslenska">🇮🇸</button><button id="langEN" title="English">🇬🇧</button></div>
  </div>
  <div class="eyebrow" data-i18n="eyebrow"></div>
  <h1><div class="logo-main" id="mt1">MORSE</div><div class="logo-sub" id="mt2">SKÝR SKILABOÐ</div></h1>
  <div class="src"><span data-i18n="src1"></span> <b id="stamp">…</b> <span data-i18n="src2"></span></div>
</header>

<section class="live" id="livePanel" style="display:none">
  <div class="metric-row">
    <div class="hero">
      <div class="val" id="liveHeroVal">–</div>
      <div class="sub" id="liveHeroSub"></div>
    </div>
    <div class="ctx" id="liveCtx"></div>
  </div>
  <div class="range-chips" id="liveRange"></div>
  <div class="chart-wrap" id="liveWrap"></div>
  <div class="eyebrow belowchart"><span data-i18n="liveEyeA"></span> <span id="liveEyeRange"></span> · <span style="color:var(--magma)">◆</span> <span data-i18n="liveEye2"></span></div>
</section>

<section class="events" id="eventsPanel" style="display:none">
  <h2 data-i18n="evH2"></h2>
  <div class="sub" data-i18n="evSub"></div>
  <div id="evCards"></div>
</section>

<section class="prices" id="pricePanel" style="display:none">
  <div class="metric-row">
    <div class="hero">
      <div class="val" id="priceHeroVal">–</div>
      <div class="sub" id="priceHeroSub"></div>
    </div>
    <div class="ctx" id="priceCtx"></div>
  </div>
  <div class="chart-wrap" id="priceWrap"></div>
  <div class="eyebrow belowchart" id="priceCaption"></div>
</section>

<section class="ntbl" id="notifPanel" style="display:none">
  <h2 data-i18n="ntH2"></h2>
  <div class="sub" data-i18n="ntSub"></div>
  <div class="scroll"><table class="notifs"><thead>
    <tr><th data-i18n="thOcc"></th><th data-i18n="thPub"></th><th data-i18n="thLag"></th><th data-i18n="thNot"></th></tr>
  </thead><tbody id="notifRows"></tbody></table></div>
  <div class="foot2" id="notifFoot"></div>
</section>

<section class="h48">
  <div class="metric-row">
    <div class="hero">
      <div class="val" id="h48HeroVal">–</div>
      <div class="sub" id="h48HeroSub"></div>
    </div>
    <div class="ctx" id="h48Ctx"></div>
  </div>
  <div class="chart-wrap" id="chartWrap"></div>
  <div class="eyebrow belowchart"><span data-i18n="hourly1"></span> <span id="h48from"></span><span data-i18n="hourly2"></span></div>
</section>

<section class="now">
  <div class="now-head">

function fmtDate(d,opts={}){

 if(opts.weekday==="long")parts.push(IS_WEEKDAYS[d.getDay()]+",");
 else if(opts.weekday==="short")parts.push(IS_WEEKDAYS_SHORT[d.getDay()]);
 const day=opts.day==="2-digit"?hh2(d.getDate()):d.getDate();
 const month=opts.month==="long"?IS_MONTHS[d.getMonth()]:IS_MONTHS_SHORT[d.getMonth()];
 parts.push(`${day}.`,month);
 if(opts.year)parts.push(String(d.getFullYear()));

 if(opts.hour)s+=(opts.year?",":"")+" kl. "+hh2(d.getHours())+":"+hh2(d.getMinutes());
 return s;
}

function fmtNum(value,decimals=0){
 if(value==null||isNaN(value))return "–";
 const neg=value<0; value=Math.abs(value);

 const grouped=intPart.replace(/\B(?=(\d{3})+(?!\d))/g, LANG==="is"?".":",");
 const out=grouped+(decPart?(LANG==="is"?",":".")+decPart:"");
 return (neg?"-":"")+out;
}

/* ---------------- classification of fetched records ---------------- */
const UNIT_CAP={SUL:60,KRA:30,VAF:45,SVA:30,HEL:45,BUR:45,SIG:50,LJO:4,REY:50,NES:30,BLA:50,HRA:70,KAR:115,STE:9};
const EST_STATIONS=new Set(["SVA","LJO","REY","STE"]);
function classify(k,title,sysStr){
 const t=title.toLowerCase();
 if(/prufukeyrsla/.test(t))return{cat:"test"};
 if(/prófunarrekstur|profunarrekstur|houseload/.test(t))return{cat:"trial"};
 if(sysStr==="D")return{cat:"dist"};
 if(!/[VB]/.test(sysStr))return{cat:"grid"};
 if(/allsherjarstopp|lón tóm|lon tom|tæming|taeming|aflstöð úr rekstri|aflstod ur rekstri/.test(t))
  return{cat:"station",mw:STATION_CAP[k]||null,est:!(k in STATION_CAP)};
 const unitXfmr=/vélaspenni|velaspenni/.test(t);
 if(!unitXfmr && /(^|[^a-z])sp\d|vsp\d|spennuspenn|spennaskoðun|spennaskodun|\bgis\b|teinn|aflrofi|skilrofa|mælaspenn|maelaspenn|hringtein/.test(t))
  return{cat:"xfmr"};
 if(/ov6/.test(t))return{cat:"unit",mw:35,est:true};
 let n=(title.match(/(?:^|[^A-Za-z0-9])V[1-6]\b/g)||[]).length;
 (t.match(/vél(?:ar)?(?:\s*nr\.?)?\s*\d(?:\s*og\s*\d)*/g)||[]).forEach(m=>{n+=(m.match(/\d/g)||[]).length});
 if(n===0&&/(sva1|svae|upptekt|vikustopp|rafali|vélaspenni|velaspenni)/.test(t))n=1;
 if(n===0)return{cat:"unit",mw:null,est:true,note:"generation work — unit not identified"};
 const cap=UNIT_CAP[k];
 return{cat:"unit",mw:cap?cap*n:null,est:EST_STATIONS.has(k)||!cap};
}
const SYS_LETTER=names=>{
 const v=names.some(n=>/vinnslu/i.test(n)),f=names.some(n=>/flutnings/i.test(n)),d=names.some(n=>/dreifi/i.test(n));
 return (v&&f)?"B":v?"V":d?"D":"F";
};
const ST_KEY={"Hafin":"live","Í undirbúningi":"prep","Undirbúningi lokið":"prepdone","Lokið":"done"};
function mapRaw(op){
 if(!op||!op.start||!op.end)return null;
 const k=(op.kks&&op.kks[0])||"?";
 const sys=SYS_LETTER(op.sys||[]);
 const cls=classify(k,op.title||"",sys);
 if(op.kksName&&!NAMES[k])NAMES[k]=op.kksName;
 return Object.assign({k,t:op.title,s:op.start.slice(0,16),e:op.end.slice(0,16),sys,
  co:(op.co||[]).join("+"),st:ST_KEY[(op.status||[])[0]]||"prep"},cls);
}

/* ---------------- data loading ---------------- */
let D=[];
async function boot(){
 const stamp=document.getElementById("stamp");
 try{
  const r=await fetch("data.json",{cache:"no-store"});
  if(r.status===404){D=[];document.getElementById("stamp").textContent=t("stampNoPublic");initTime();renderList();return;}
  if(!r.ok)throw new Error(r.status);
  const j=await r.json();
  D=j.operations.map(mapRaw).filter(Boolean);
  if(D.length<10)throw new Error("too few records");
  const sentEnd=LANG==="is"?".":" ·";
  stamp.textContent=(j.delayed?t("stampDelayed"):"")+t("stampFetched")+" "+fmtDate(new Date(j.fetchedAt),{day:"numeric",month:"long",year:"numeric",hour:true})+sentEnd;
 }catch(e){
  D=FALLBACK.slice();
  stamp.textContent=t("stampFallback");
 }
 D.sort((a,b)=>a.s.localeCompare(b.s));
 initTime();
 renderList();
}

/* ---------------- helpers ---------------- */
const TOTAL_CAP=3060;
const ST_CLS={live:"live",done:"done"};
const fmtD=iso=>{const d=new Date(iso);return fmtDate(d,{day:"2-digit",month:"short",year:"numeric"})+" "+iso.slice(11,16)};
const durTxt=(s,e)=>{const ms=new Date(e)-new Date(s),h=ms/36e5;if(h<48)return Math.round(h)+" "+t("u_h");const d=h/24;if(d<62)return Math.round(d)+" "+t("u_days");return (d/30.44).toFixed(1)+" "+t("u_months")};

/* de-duplicated MW total for a given moment */
function mwAt(t){
 const byStation={};
 D.forEach(o=>{
  if(o.cat!=="unit"&&o.cat!=="station")return;
  if(o.mw==null)return;
  if(new Date(o.s)<=t&&t<new Date(o.e)){
   const b=byStation[o.k]||(byStation[o.k]={units:0,station:0});
   if(o.cat==="station")b.station=Math.max(b.station,o.mw);
   else b.units+=o.mw;
  }
 });
 const parts=[];let sum=0;
 for(const k in byStation){
  const b=byStation[k],cap=STATION_CAP[k]||1e9;
  const v=Math.min(cap,Math.max(b.station,Math.min(b.units,cap)));
  if(v>0){parts.push({k,v});sum+=v}
 }
 parts.sort((a,b)=>b.v-a.v);
 return{sum,parts};
}

/* ---------------- render: hourly line for the selected day ---------------- */
function renderDayChart(dayStart){
 document.getElementById("h48from").textContent=fmtDate(dayStart,{weekday:"long",day:"2-digit",month:"long",year:"numeric"});
 const hours=[];
 for(let i=0;i<24;i++){
  const t0=new Date(dayStart.getTime()+i*36e5);
  const r=mwAt(new Date(t0.getTime()+18e5)); // sample mid-hour
  hours.push({t:t0,sum:r.sum,parts:r.parts});
 }
 const vals=hours.map(h=>h.sum);
 const vmax=Math.max(...vals),vmin=Math.min(...vals);
 const ymin=Math.max(0,Math.floor((vmin-20)/10)*10);          /* lowest value - 20 MW, never below 0 */
 const ymax=Math.max(ymin+40,Math.ceil((vmax+20)/10)*10);
 const range=ymax-ymin;
 const step=[10,20,25,50,100,200].find(s=>range/s<=6)||200;
 const W=960,H=230,L=52,R=14,T=18,B=32,PW=W-L-R,PH=H-T-B;
 const x=i=>L+(i/23)*PW;
 const y=v=>T+PH-((v-ymin)/range)*PH;
 let svg=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Hourly MW offline for the selected day">`;
 for(let v=Math.ceil(ymin/step)*step;v<=ymax;v+=step){
  svg+=`<line class="hgrid" x1="${L}" y1="${y(v)}" x2="${W-R}" y2="${y(v)}"/>`;
  svg+=`<text class="aylbl" x="${L-7}" y="${y(v)+3}" text-anchor="end">${v}</text>`;
 }
 for(let i=0;i<24;i+=3)svg+=`<text class="axlbl" x="${x(i)}" y="${H-14}" text-anchor="middle">${String(i).padStart(2,"0")}:00</text>`;
 /* step line + soft area */
 let dLine=`M ${x(0)} ${y(vals[0])}`;
 for(let i=1;i<24;i++)dLine+=` L ${x(i)} ${y(vals[i-1])} L ${x(i)} ${y(vals[i])}`;
 dLine+=` L ${W-R} ${y(vals[23])}`;
 svg+=`<path class="larea" d="${dLine} L ${W-R} ${T+PH} L ${L} ${T+PH} Z"/>`;
 svg+=`<path class="lpath" d="${dLine}"/>`;
 svg+=`<circle class="hdot" id="hdot" r="5" cx="${x(0)}" cy="${y(vals[0])}" style="display:none"/>`;
 for(let i=0;i<24;i++){
  const x0=i===0?L:(x(i-1)+x(i))/2, x1=i===23?W-R:(x(i)+x(i+1))/2;
  svg+=`<rect class="hhit" data-h="${i}" x="${x0}" y="${T}" width="${x1-x0}" height="${PH}"/>`;
 }
 svg+=`<line class="hgrid" x1="${L}" y1="${T+PH}" x2="${W-R}" y2="${T+PH}" style="stroke:var(--basalt);stroke-width:1.5"/>`;
 svg+=`</svg>`;
 document.getElementById("chartWrap").innerHTML=svg;
 const pk=hours.reduce((a,b)=>b.sum>a.sum?b:a,hours[0]);
 const hh=n=>String(n).padStart(2,"0")+":00";
 const heroVal=document.getElementById("h48HeroVal"),heroSub=document.getElementById("h48HeroSub");
 document.getElementById("h48Ctx").innerHTML=
  `<div>${t("dayLow")}: <b>${fmtNum(vmin,0)} MW</b></div>`+
  `<div>${t("peakWord")}: <b>${fmtNum(vmax,0)} MW</b> ${t("atWord")} ${hh(pk.t.getHours())}</div>`+
  `<div class="ctx-note">${t("yaxis")} ${fmtNum(ymin,0)}–${fmtNum(ymax,0)} MW · ${t("estWord")}</div>`;
 const showHour=i=>{

async function loadLive(){
 const HOURS=LIVE_HOURS;

 try{

 }catch(e){return} // no backend (e.g. file opened standalone) — keep panel hidden
 try{

 }catch(e){}
 document.getElementById("livePanel").style.display="";
 renderLiveRange();

 const t1=new Date(load[load.length-1].ts).getTime(), t0=t1-HOURS*36e5;
 let pts=load.map(p=>({t:new Date(p.ts).getTime(),v:p.total_mw})).filter(p=>p.t>=t0);
 // long windows: average into buckets so the chart stays light (~≤400 points)
 const bucket=Math.ceil(pts.length/400);
 if(bucket>1){
  const merged=[];
  for(let i=0;i<pts.length;i+=bucket){
   const slice=pts.slice(i,i+bucket);
   merged.push({t:slice[slice.length-1].t, v:slice.reduce((a,p)=>a+p.v,0)/slice.length});
  }
  pts=merged;
 }
 const vals=pts.map(p=>p.v);
 const vmax=Math.max(...vals),vmin=Math.min(...vals);
 const ymin=Math.max(0,Math.floor((vmin-20)/10)*10);
 const ymax=Math.max(ymin+40,Math.ceil((vmax+20)/10)*10);
 const range=ymax-ymin;
 const step=[10,20,25,50,100,200,500].find(s=>range/s<=6)||500;
 const W=960,H=230,L=56,R=14,T=18,B=32,PW=W-L-R,PH=H-T-B;
 const x=t=>L+((t-t0)/(t1-t0))*PW;
 const y=v=>T+PH-((v-ymin)/range)*PH;
 let svg=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Total flow">`;
 for(let v=Math.ceil(ymin/step)*step;v<=ymax;v+=step){

 }
 if(HOURS<=48){

  const firstTick=new Date(t0);firstTick.setMinutes(0,0,0);
  for(let t=firstTick.getTime();t<=t1;t+=36e5){
   const d=new Date(t);
   if(d.getHours()%tickEvery===0&&t>=t0)
    svg+=`<text class="axlbl" x="${x(t)}" y="${H-14}" text-anchor="middle">${String(d.getHours()).padStart(2,"0")}:00</text>`;
  }
 }else{
  const firstMid=new Date(t0);firstMid.setHours(24,0,0,0);   // next midnight
  for(let t=firstMid.getTime();t<=t1;t+=864e5){
   svg+=`<line class="hgrid" x1="${x(t)}" y1="${T}" x2="${x(t)}" y2="${T+PH}" style="stroke:var(--line)"/>`;
   svg+=`<text class="axlbl" x="${x(t)}" y="${H-14}" text-anchor="middle">${fmtDate(new Date(t),{day:"numeric",month:"short"})}</text>`;
  }
 }
 let dL=pts.map((p,i)=>`${i?"L":"M"} ${x(p.t).toFixed(1)} ${y(p.v).toFixed(1)}`).join(" ");
 svg+=`<path class="lconsarea" d="${dL} L ${x(pts[pts.length-1].t)} ${T+PH} L ${x(pts[0].t)} ${T+PH} Z"/>`;
 svg+=`<path class="lcons" d="${dL}"/>`;
 /* control-room notifications inside the window */
 const inWin=notifs.map(n=>({...n,t:new Date(n.ts).getTime()})).filter(n=>n.t>=t0&&n.t<=t1);
 inWin.forEach(n=>{
  svg+=`<line class="notifline" x1="${x(n.t)}" y1="${T}" x2="${x(n.t)}" y2="${T+PH}"/>`;
 });
 svg+=`<circle class="livedot" id="livedot" r="4" style="display:none"/>`;
 for(let i=0;i<pts.length;i++){
  const x0=i===0?L:(x(pts[i-1].t)+x(pts[i].t))/2, x1=i===pts.length-1?W-R:(x(pts[i].t)+x(pts[i+1].t))/2;
  svg+=`<rect class="hhit" data-p="${i}" x="${x0.toFixed(1)}" y="${T}" width="${(x1-x0).toFixed(1)}" height="${PH}"/>`;
 }
 /* dots drawn last = top of the stack, each with a generous invisible hit circle */
 inWin.forEach((n,i)=>{
  svg+=`<circle class="notifdot" data-n="${i}" cx="${x(n.t)}" cy="${T+6}" r="6"/>`;
  svg+=`<circle class="notifhit" data-n="${i}" cx="${x(n.t)}" cy="${T+6}" r="15"/>`;
 });
 svg+=`<line class="hgrid" x1="${L}" y1="${T+PH}" x2="${W-R}" y2="${T+PH}" style="stroke:var(--basalt);stroke-width:1.5"/>`;
 svg+=`</svg>`;
 document.getElementById("liveWrap").innerHTML=svg;
 const cur=pts[pts.length-1];
 const isDelayed=!!window.__loadDelayed;
 const ageMin=Math.round((Date.now()-cur.t)/6e4);
 const stale=!isDelayed&&ageMin>15;

 heroVal.style.opacity=stale?".35":"1";
 let warn="";
 if(isDelayed)warn+=`<div style="color:var(--magma);font-weight:600">${t("preview1")} ${Math.round(DELAY_H)} ${t("preview2")}</div>`;
 if(stale)warn+=`<div style="color:var(--magma);font-weight:600">${t("staleWarn1")} ${ageMin>120?Math.round(ageMin/60)+" "+t("u_h"):ageMin+" "+t("u_min")} ${t("staleWarn2")}</div>`;
 document.getElementById("liveCtx").innerHTML=warn+
  `<div>${t("refValueLbl")}: <b>${fmtNum(cur.v,1)} MW</b></div>`+
  `<div>${rangeLbl()} ${t("lowWord")}: <b>${fmtNum(vmin,0)} MW</b></div>`+
  `<div>${rangeLbl()} ${t("highWord")}: <b>${fmtNum(vmax,0)} MW</b></div>`+
  `<div class="ctx-note">${t("updatedWord")} ${fmtTime(new Date(cur.t))} · ${inWin.length} ${inWin.length===1?t("notif1"):t("notifN")}</div>`;
 const dot=document.getElementById("livedot");
 const hhmm=x=>fmtTime(new Date(x));
 const showPoint=p=>{
  dot.style.display="";dot.setAttribute("cx",x(p.t));dot.setAttribute("cy",y(p.v));
  heroVal.textContent=fmtNum(p.v,1)+" MW";

                     :(LANG==="is"?"kl. ":"")+hhmm(p.t);
  heroSub.textContent=(p.t===cur.t?t("heroLiveLbl"):t("heroAtLbl"))+" ("+time+")"+(bucket>1?" · "+t("avgOfWord")+" "+bucket*5+" "+t("u_min"):"");
 };
 showPoint(pts[pts.length-1]);   // default: the newest reading
 document.getElementById("liveWrap").onmousemove=e=>{
  const nd=e.target.closest(".notifhit")||e.target.closest(".notifdot");
  if(nd){

   heroVal.textContent="◆ "+hhmm(n.t);

   return;
  }
  const r=e.target.closest(".hhit");if(!r)return;

}
loadLive();
setInterval(loadLive,5*60*1000);

/* ---------------- grid events: cluster shifts + narrate -------------------- */
async function loadEvents(){
 let shifts=[],notifs=[];
 try{
  const r=await fetch("api/shifts?days=7",{cache:"no-store"});
  if(!r.ok)return;
  shifts=(await r.json()).shifts||[];
 }catch(e){return}
 try{
  const rn=await fetch("api/notifications?days=8",{cache:"no-store"});
  if(rn.ok)notifs=(await rn.json()).notifications||[];
 }catch(e){}
 if(!shifts.length){document.getElementById("eventsPanel").style.display="none";return}
 document.getElementById("eventsPanel").style.display="";
 shifts.sort((a,b)=>a.ts.localeCompare(b.ts));
 // cluster: gap ≤ 30 min
 const clusters=[];let cur=null;
 shifts.forEach(s=>{
  const tms=new Date(s.ts).getTime();
  if(cur&&tms-cur.end<=30*6e4){cur.items.push(s);cur.end=tms;}
  else{cur={start:tms,end:tms,items:[s]};clusters.push(cur);}
 });
 const hhmm=x=>fmtTime(new Date(x));
 const dmy=x=>fmtDate(new Date(x),{day:"2-digit",month:"short"});
 const fmtLag=m=>m<60?m+" "+t("u_min"):m<48*60?(m/60).toFixed(1)+" "+t("u_h"):Math.round(m/1440)+" d";
 const html=clusters.slice().reverse().map(c=>{
  const first=c.items[0],last=c.items[c.items.length-1];
  const startMW=first.from_mw,extreme=c.items.reduce((a,s)=>Math.abs(s.to_mw-startMW)>Math.abs(a-startMW)?s.to_mw:a,first.to_mw);
  const net=Math.round(extreme-startMW);
  const isDrop=net<0;
  const durMin=Math.round((c.end-c.start)/6e4)+first.window_min;
  // snið analysis from the first shift with before/after data
  const withSnid=c.items.find(s=>s.snid_from&&s.snid_to&&Object.keys(s.snid_from).length);
  let moversLine="",lockstep=false,reversals=[];
  if(withSnid){
   const keys=[...new Set([...Object.keys(withSnid.snid_from),...Object.keys(withSnid.snid_to)])];
   const moves=keys.map(k=>({k,from:+withSnid.snid_from[k]||0,to:+withSnid.snid_to[k]||0}))
     .map(m=>({...m,d:Math.round((m.to-m.from)*10)/10}))
     .filter(m=>Math.abs(m.d)>=10).sort((a,b)=>Math.abs(b.d)-Math.abs(a.d));
   if(moves.length){
    const top=moves.slice(0,3);
    moversLine=top.map(m=>`${m.k} ${m.d>0?"+":""}${Math.round(m.d)}`).join(" · ");
    lockstep=moves.length>=2&&Math.sign(moves[0].d)===Math.sign(moves[1].d)&&Math.abs(moves[1].d)>=Math.abs(moves[0].d)*0.6;
    reversals=moves.filter(m=>m.from*m.to<0&&Math.abs(m.from)>=15&&Math.abs(m.to)>=5)
      .map(m=>`${m.k} (${Math.round(m.from)} → ${Math.round(m.to)})`);
   }
  }
  // recovery: did it return within 15% of start?
  const recovered=Math.abs(last.to_mw-startMW)<Math.abs(net)*0.15&&c.items.length>1;
  // notification match: occurred within event window ±30 min
  const match=notifs.find(n=>{const nt=new Date(n.ts).getTime();return nt>=c.start-45*6e4&&nt<=c.end+45*6e4;});
  const fresh=(Date.now()-c.end)<24*36e5;
  let noteHtml="";
  if(match)noteHtml=`<div class="evnote"><b>${t("evNotifMatch")}:</b> “${match.short}” · ${t("evNotifLag")} ${fmtLag(match.publish_lag_min)} ${t("evLater")}</div>`;
  else if(fresh)noteHtml=`<div class="evnote pending">${t("evNoNotif")}</div>`;
  const mag=Math.abs(net)>=250?t("evMagSmelter"):Math.abs(net)>=100?t("evMagUnit"):"";
  return `<div class="evcard${isDrop?"":" rise"}">
   <div class="evhead">
     <span class="evtitle">${isDrop?t("evDrop"):t("evRise")} <b>${net>0?"+":""}${net} MW</b> ${t("evOver")} ${durMin} ${t("evMin")}</span>
     <span class="evtime">${dmy(c.start)} ${hhmm(c.start)}–${hhmm(c.end)} · ${Math.round(startMW)} → ${Math.round(extreme)} MW</span>
   </div>
   <div class="evbody">
     ${moversLine?`<span class="evsnid"><b>${t("evMovers")}:</b> ${moversLine}</span><br>`:""}
     ${lockstep?t("evLockstep")+". ":""}
     ${reversals.length?t("evReversal")+": "+reversals.join(", ")+". ":""}
     ${mag?mag+". ":""}
     ${recovered?t("evRecovered")+" "+durMin+" "+t("evMin")+".":""}
   </div>
   ${noteHtml}
  </div>`;
 }).join("");
 const cards=document.getElementById("evCards");
 cards.innerHTML=html;
 const n=clusters.length;
 let btn=document.getElementById("evToggle");
 if(btn)btn.remove();
 if(n>1){
  cards.classList.toggle("collapsed",!window.__evExpanded);
  btn=document.createElement("button");
  btn.id="evToggle";btn.className="evtoggle";
  btn.textContent=window.__evExpanded?t("evShowLess"):`${t("evShowMore")} (${n-1})`;
  btn.onclick=()=>{
   window.__evExpanded=!window.__evExpanded;
   cards.classList.toggle("collapsed",!window.__evExpanded);
   btn.textContent=window.__evExpanded?t("evShowLess"):`${t("evShowMore")} (${n-1})`;
  };
  cards.after(btn);
 }else{
  cards.classList.remove("collapsed");
 }
}
loadEvents();
setInterval(loadEvents,5*60*1000);

  `<div class="ctx-note">${t("priceLastHour")}: ${fmtDate(rows[rows.length-1].t,{day:"numeric",month:"short",hour:true})}</div>`;
 document.getElementById("priceWrap").onmousemove=e=>{
  const r=e.target.closest(".hhit");if(!r)return;
  showBar(+r.dataset.i);
 };
}
loadPrices();
setInterval(loadPrices,5*60*1000);

</script>
